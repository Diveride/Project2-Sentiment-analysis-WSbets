name: Daily WSB Refresh

on:
  push:
    branches:
      - main
  schedule:
    - cron: "20 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_SECRET_ID: ${{ secrets.REDDIT_SECRET_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_SECRET_ID }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      WSB_REDDIT_AUTH_MODE: auto
      WSB_REDDIT_MAX_RETRIES: "4"
      WSB_REDDIT_BACKOFF_SECONDS: "2"
      WSB_REDDIT_MAX_BACKOFF_SECONDS: "20"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            .github/workflows/daily-analysis-constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install "pip==26.0.1"
          python -m pip install -r requirements.txt -c .github/workflows/daily-analysis-constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
          python - <<'PY'
          import nltk

          for resource in ("punkt", "stopwords", "wordnet", "omw-1.4", "vader_lexicon"):
              nltk.download(resource, quiet=True)
          PY

      - name: Clean stale outputs
        run: |
          rm -rf outputs/latest_wsb_analysis

      - name: Run latest WSB analysis pipeline
        run: |
          python run_latest_analysis.py --top-n 10 --per-feed 100 --price-period 1y

      - name: Enforce live data source on scheduled runs
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          summary_path = pathlib.Path("outputs/latest_wsb_analysis/top10_summary.json")
          if not summary_path.exists():
              sys.exit(f"Missing expected summary file: {summary_path}")

          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          data_source = str(payload.get("data_source", ""))
          diagnostics = payload.get("fetch_diagnostics", {})
          print(f"data_source={data_source}")
          if diagnostics:
              print("fetch_diagnostics=")
              print(json.dumps(diagnostics, indent=2))
          if data_source.startswith("fallback:"):
              fallback_reason = diagnostics.get("fallback_reason", "No fallback reason recorded.")
              sys.exit(f"Fallback data source detected; failing workflow for freshness. Reason: {fallback_reason}")
          PY

      - name: Warn on fallback data source for push/manual runs
        if: ${{ github.event_name != 'schedule' }}
        run: |
          python - <<'PY'
          import json
          import pathlib

          summary_path = pathlib.Path("outputs/latest_wsb_analysis/top10_summary.json")
          if not summary_path.exists():
              print(f"::warning::Missing expected summary file: {summary_path}")
              raise SystemExit(0)

          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          data_source = str(payload.get("data_source", ""))
          diagnostics = payload.get("fetch_diagnostics", {})
          print(f"data_source={data_source}")
          if diagnostics:
              print("fetch_diagnostics=")
              print(json.dumps(diagnostics, indent=2))
          if data_source.startswith("fallback:"):
              fallback_reason = diagnostics.get("fallback_reason", "No fallback reason recorded.")
              print(f"::warning::Fallback data source detected on non-scheduled run; continuing. Reason: {fallback_reason}")
          PY

      - name: Execute notebooks
        env:
          WSB_REFRESH_DATA: "0"
        run: |
          python -m jupyter nbconvert --to notebook --execute "WSBets_Sentiment_Analysis.ipynb" --output "WSBets_Sentiment_Analysis.executed.ipynb" --ExecutePreprocessor.timeout=1800
          python -m jupyter nbconvert --to notebook --execute "financial_metrics.ipynb" --output "financial_metrics.executed.ipynb" --ExecutePreprocessor.timeout=1800
          python -m jupyter nbconvert --to notebook --execute "word_sentiment_of_reddit_wsb.ipynb" --output "word_sentiment_of_reddit_wsb.executed.ipynb" --ExecutePreprocessor.timeout=1800
          python -m jupyter nbconvert --to notebook --execute "stock_prediction_with_PyTorch.ipynb" --output "stock_prediction_with_PyTorch.executed.ipynb" --ExecutePreprocessor.timeout=1800


      - name: Update README top10 section
        run: |
          python scripts/update_readme_top10.py

      - name: Upload latest analysis artifacts
        uses: actions/upload-artifact@v5
        with:
          name: latest-wsb-analysis
          path: |
            outputs/latest_wsb_analysis/
            *.executed.ipynb
          retention-days: 14

      - name: Commit and push refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md outputs/latest_wsb_analysis *.executed.ipynb
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily refresh analysis outputs and notebook runs"
            git push
          fi

