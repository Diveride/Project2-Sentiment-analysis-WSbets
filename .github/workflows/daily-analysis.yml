name: Daily WSB Refresh

on:
  schedule:
    - cron: "20 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            .github/workflows/daily-analysis-constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install "pip==26.0.1"
          python -m pip install -r requirements.txt -c .github/workflows/daily-analysis-constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
          python -m nltk.downloader punkt stopwords wordnet omw-1.4 vader_lexicon

      - name: Clean stale outputs
        run: |
          rm -rf outputs/latest_wsb_analysis

      - name: Run latest WSB analysis pipeline
        run: |
          python run_latest_analysis.py --top-n 10 --per-feed 100 --price-period 1y

      - name: Fail on fallback data source
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          summary_path = pathlib.Path("outputs/latest_wsb_analysis/top10_summary.json")
          if not summary_path.exists():
              sys.exit(f"Missing expected summary file: {summary_path}")

          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          data_source = str(payload.get("data_source", ""))
          print(f"data_source={data_source}")
          if data_source.startswith("fallback:"):
              sys.exit("Fallback data source detected; failing workflow for freshness.")
          PY

      - name: Execute notebooks
        env:
          WSB_REFRESH_DATA: "0"
        run: |
          python -m jupyter nbconvert --to notebook --execute "WSBets_Sentiment_Analysis.ipynb" --output "WSBets_Sentiment_Analysis.executed.ipynb" --ExecutePreprocessor.timeout=1800
          python -m jupyter nbconvert --to notebook --execute "financial_metrics.ipynb" --output "financial_metrics.executed.ipynb" --ExecutePreprocessor.timeout=1800
          python -m jupyter nbconvert --to notebook --execute "word_sentiment_of_reddit_wsb.ipynb" --output "word_sentiment_of_reddit_wsb.executed.ipynb" --ExecutePreprocessor.timeout=1800
          python -m jupyter nbconvert --to notebook --execute "stock_prediction_with_PyTorch.ipynb" --output "stock_prediction_with_PyTorch.executed.ipynb" --ExecutePreprocessor.timeout=1800


      - name: Update README top10 section
        run: |
          python scripts/update_readme_top10.py

      - name: Upload latest analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latest-wsb-analysis
          path: |
            outputs/latest_wsb_analysis/
            *.executed.ipynb
          retention-days: 14

      - name: Commit and push refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md outputs/latest_wsb_analysis *.executed.ipynb
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily refresh analysis outputs and notebook runs"
            git push
          fi

